<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYXEN | Premium Inspired Fragrance</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9b59b2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon.png">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, onSnapshot, collection, addDoc, updateDoc, increment, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXLACoKi11HXdQ47uEL-HnIw_R-T-44vo",
            authDomain: "nyxen-official-183b6.firebaseapp.com",
            projectId: "nyxen-official-183b6",
            storageBucket: "nyxen-official-183b6.firebasestorage.app",
            messagingSenderId: "180327659657",
            appId: "1:180327659657:web:24d94b9d94bc349f232e58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.bag = [];
        let currentFilter = 'all';
        let rawInventory = [];

        window.notify = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        window.setFilter = (gender) => {
            currentFilter = gender;
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        };

        onSnapshot(collection(db, "inventory"), (snap) => {
            rawInventory = [];
            snap.forEach(doc => rawInventory.push(doc.data()));
            renderProducts();
        });

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            const filtered = currentFilter === 'all' 
                ? rawInventory 
                : rawInventory.filter(p => p.gender && p.gender.toLowerCase() === currentFilter.toLowerCase());
            
            if (filtered.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1; color:#555; margin-top:50px;">No scents found in this category.</p>`;
                return;
            }

            filtered.forEach(p => {
                const isOut = p.qty <= 0;
                grid.innerHTML += `
                    <div class="product-card ${isOut ? 'out' : ''}">
                        <div class="price-label">₱${p.price}</div>
                        <div class="portrait-box">
                            <img src="${p.img}" alt="${p.name}">
                            <div class="inner-promo">COLLECT TOTAL OF 3 BOTTLES FOR FREE SHIPPING</div>
                        </div>
                        <div class="info">
                            <h3>${p.name}</h3>
                            <p style="font-size:0.6rem; color:#888;">${p.qty > 0 ? p.qty + ' limited pieces left' : 'OUT OF STOCK'}</p>
                            <button class="add-btn" onclick="addToBag('${p.name}', ${p.price}, '${p.img}', this)" ${isOut ? 'disabled' : ''}>
                                ${isOut ? 'OUT OF STOCK' : 'ADD TO COLLECTION'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        window.calculateShipping = (address) => {
            if (window.bag.length >= 3) return { fee: 0, loc: "FREE SHIPPING" };
            const clean = address.toLowerCase();
            if (clean.includes("bacolod")) return { fee: 50, loc: "Bacolod City" };
            if (clean.includes("negros")) return { fee: 110, loc: "Within Negros" };
            return { fee: 125, loc: "Outside Negros" };
        };

        window.addToBag = async (name, price, img, btn) => {
            window.bag.push({ name, price });
            updateCartUI();
            try { await updateDoc(doc(db, "inventory", name), { clicks: increment(1) }); } catch(e){}
            window.notify(`Added to collections.`);
            if(btn) {
                btn.innerText = "COLLECTED";
                setTimeout(() => btn.innerText = "ADD TO COLLECTION", 1000);
            }
        };

        window.removeFromBag = (index) => {
            window.bag.splice(index, 1);
            updateCartUI();
        };

        window.submitOrder = async () => {
            const name = document.getElementById('c-name').value;
            const phone = document.getElementById('c-phone').value;
            const addr = document.getElementById('c-addr').value;
            if(!name || !phone || !addr || window.bag.length === 0) return window.notify("Complete details required.");
            
            const itemsTotal = window.bag.reduce((s, i) => s + i.price, 0);
            const shipDetails = calculateShipping(addr);
            const finalTotal = itemsTotal + shipDetails.fee;

            try {
                const docRef = await addDoc(collection(db, "orders"), {
                    customerName: name, phoneNumber: phone, address: addr,
                    items: window.bag, totalAmount: finalTotal, status: "Pending", date: Date.now()
                });
                const orderID = docRef.id.slice(-5).toUpperCase();
                let msg = `NYXEN PRIVATE COLLECTION ORDER #${orderID}\n\n`;
                window.bag.forEach(i => msg += `• ${i.name}\n`);
                msg += `\nSubtotal: ₱${itemsTotal}\nShipping: ₱${shipDetails.fee} (${shipDetails.loc})\nTOTAL: ₱${finalTotal}`;
                msg += `\n\nRecipient: ${name}\nPhone: ${phone}\nAddress: ${addr}`;
                window.location.href = `https://m.me/296084720263105?text=${encodeURIComponent(msg)}`;
            } catch (e) { window.notify("Order failed."); }
        };
    </script>

    <style>
        :root { --amethyst: #9b59b2; --bg: #050505; --card: #121212; --orange: #e67e22; --green: #2ecc71; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; user-select: none; overflow-x: hidden; }
        
        /* Responsive Header */
        header { text-align: center; padding: 30px 15px 10px; background: linear-gradient(to bottom, #111, #050505); }
        .logo { font-size: 2.5rem; font-weight: 200; letter-spacing: 8px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(155, 89, 182, 0.3); }
        .tagline { color: var(--amethyst); font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.8; }
        
        /* Filter Nav */
        .filter-nav { display: flex; justify-content: center; gap: 8px; margin: 20px auto; flex-wrap: wrap; max-width: 95%; }
        .filter-btn { background: none; border: 1px solid #222; color: #555; padding: 8px 12px; border-radius: 5px; font-size: 0.55rem; letter-spacing: 1px; cursor: pointer; transition: 0.3s; font-weight: bold; flex: 1; max-width: 120px; }
        .filter-btn.active { border-color: var(--amethyst); color: #fff; background: rgba(155, 89, 182, 0.1); }

        /* Grid System */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; padding: 15px; }
        
        .product-card { background: var(--card); border: 1px solid #222; position: relative; border-radius: 4px; overflow: hidden; transition: 0.4s ease; }
        .portrait-box { aspect-ratio: 2/3; overflow: hidden; background: #000; position: relative; }
        .portrait-box img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        .inner-promo { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(155, 89, 182, 0.85); color: white; font-size: 0.5rem; font-weight: 900; padding: 6px; text-align: center; letter-spacing: 1px; }
        
        .price-label { position: absolute; top: 10px; right: 0; background: var(--amethyst); padding: 4px 12px; font-weight: bold; z-index: 5; font-size: 0.8rem; clip-path: polygon(15% 0, 100% 0, 100% 100%, 0% 100%); }
        .info { padding: 15px; text-align: center; }
        .info h3 { font-size: 0.75rem; letter-spacing: 1px; margin: 0 0 5px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .add-btn { background: #fff; color: #000; border: none; padding: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 0.65rem; letter-spacing: 1px; }
        
        /* Floating Cart Button */
        .cart-btn { position: fixed; bottom: 20px; right: 20px; background: var(--amethyst); padding: 14px 20px; border-radius: 50px; border: none; color: #fff; font-weight: bold; z-index: 1000; cursor: pointer; box-shadow: 0 8px 25px rgba(155, 89, 182, 0.4); font-size: 0.8rem; }
        
        /* Responsive Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 10px; }
        .modal { background: #111; padding: 25px 20px; border-radius: 15px; border: 1px solid rgba(155, 89, 182, 0.3); width: 100%; max-width: 400px; text-align: center; position: relative; max-height: 90vh; overflow-y: auto; }
        
        .checkout-btn { background: var(--amethyst); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; letter-spacing: 1px; margin-top: 10px; font-size: 0.9rem; transition: 0.3s; }
        
        input, textarea { background: #181818; border: 1px solid #333; color: #fff; width: 100%; padding: 12px; border-radius: 10px; margin-bottom: 8px; outline: none; font-family: inherit; font-size: 0.9rem; }
        
        /* Cart Items UI */
        #shipping-msg { font-size: 0.6rem; margin-bottom: 12px; font-weight: bold; padding: 8px; border-radius: 6px; }
        .msg-orange { background: var(--orange); color: #fff; }
        .msg-green { background: var(--green); color: #fff; }
        .msg-default { color: #aaa; border: 1px dashed #333; }

        .qty-controls { display: flex; gap: 8px; align-items: center; }
        .qty-btn { background: #222; color: #fff; border: 1px solid #444; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .shipping-breakdown { font-size: 0.7rem; color: #888; border-top: 1px solid #222; margin-top: 10px; padding-top: 10px; text-align: left; }
        .ship-line { display: flex; justify-content: space-between; margin-bottom: 4px; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid var(--amethyst); color: #fff; padding: 10px 20px; border-radius: 50px; z-index: 5000; transition: 0.5s; font-size: 0.75rem; width: max-content; }
        #toast.show { top: 20px; }

        /* Media Queries for fine-tuning */
        @media (max-width: 400px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
            .logo { font-size: 2rem; }
            .modal { padding: 20px 15px; }
            .cart-btn { bottom: 15px; right: 15px; padding: 12px 16px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div id="toast">Ready</div>
    
    <header>
        <div class="logo">NYXEN</div>
        <div class="tagline">Premium Inspired Fragrance</div>
        <div class="filter-nav">
            <button class="filter-btn active" onclick="setFilter('all')">ALL SCENTS</button>
            <button class="filter-btn" onclick="setFilter('male')">MALE</button>
            <button class="filter-btn" onclick="setFilter('female')">FEMALE</button>
        </div>
    </header>

    <div id="cart-overlay" class="overlay">
        <div class="modal">
            <h3 style="color:var(--amethyst); letter-spacing: 2px; margin-top: 0;">MY COLLECTIONS</h3>
            <div id="shipping-msg" class="msg-default">COLLECT TOTAL OF 3 BOTTLES FOR FREE SHIPPING</div>
            
            <div id="cart-items" style="margin:15px 0; text-align:left; font-size:0.75rem; max-height: 150px; overflow-y: auto;"></div>
            
            <div id="items-total-ui" style="font-weight:bold; font-size: 0.9rem; text-align: right;">ITEMS: ₱0</div>
            
            <div class="shipping-breakdown" id="ship-ui" style="display:none;">
                <div class="ship-line"><span>Shipping Fee:</span> <span id="ship-cost" style="color:var(--amethyst)">₱0</span></div>
                <div class="ship-line" style="font-size:0.6rem;"><span id="ship-loc">Calculating...</span></div>
                <div class="ship-line" style="font-size:1rem; color:#fff; font-weight:900; margin-top:8px; border-top:1px solid #333; padding-top:8px;">
                    <span>GRAND TOTAL:</span> <span id="grand-total">₱0</span>
                </div>
            </div>

            <br>
            <input type="text" id="c-name" placeholder="Full Name">
            <input type="tel" id="c-phone" placeholder="Phone Number">
            <textarea id="c-addr" placeholder="Address (include City/Province)" rows="2" oninput="updateCartUI()"></textarea>
            
            <button class="checkout-btn" onclick="submitOrder()">CHECKOUT VIA MESSENGER</button>
            
            <p onclick="document.getElementById('cart-overlay').style.display='none'" style="cursor:pointer; margin-top:15px; font-size:0.65rem; color:#666; letter-spacing: 1px;">BACK TO SHOP</p>
        </div>
    </div>

    <button class="cart-btn" onclick="document.getElementById('cart-overlay').style.display='flex'">
        COLLECTIONS (<span id="cart-count">0</span>)
    </button>

    <main id="product-grid" class="product-grid"></main>

    <script>
        function updateCartUI() {
            const count = window.bag.length;
            document.getElementById('cart-count').innerText = count;
            
            const sMsg = document.getElementById('shipping-msg');
            sMsg.className = ""; 
            if(count === 0) {
                sMsg.innerText = "COLLECT TOTAL OF 3 BOTTLES FOR FREE SHIPPING";
                sMsg.classList.add('msg-default');
            } else if(count < 3) {
                sMsg.innerText = `ADD ${3-count} MORE FOR FREE SHIPPING 🚚`;
                sMsg.classList.add('msg-orange');
            } else {
                sMsg.innerText = "FREE SHIPPING UNLOCKED! 🎉";
                sMsg.classList.add('msg-green');
            }

            const list = document.getElementById('cart-items'); list.innerHTML = "";
            let itemsTotal = 0; 
            window.bag.forEach((item, index) => {
                itemsTotal += item.price; 
                list.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="flex:1; margin-right:5px;">${item.name}</span>
                    <div class="qty-controls">
                        <span style="color:var(--amethyst); font-weight:bold; font-size:0.7rem;">₱${item.price}</span>
                        <button class="qty-btn" onclick="removeFromBag(${index})">−</button>
                        <button class="qty-btn" onclick="addToBag('${item.name}', ${item.price}, '', null)">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('items-total-ui').innerText = "ITEMS: ₱" + itemsTotal;

            const addr = document.getElementById('c-addr').value;
            const shipUI = document.getElementById('ship-ui');
            if (addr.length > 3 && count > 0) {
                shipUI.style.display = 'block';
                const res = calculateShipping(addr);
                document.getElementById('ship-cost').innerText = "₱" + res.fee;
                document.getElementById('ship-loc').innerText = "Detected: " + res.loc;
                document.getElementById('grand-total').innerText = "₱" + (itemsTotal + res.fee);
            } else { shipUI.style.display = 'none'; }
        }
    </script>
</body>
</html>
