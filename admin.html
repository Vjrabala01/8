<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYXEN | Master Empire Admin</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXLACoKi11HXdQ47uEL-HnIw_R-T-44vo",
            authDomain: "nyxen-official-183b6.firebaseapp.com",
            projectId: "nyxen-official-183b6",
            storageBucket: "nyxen-official-183b6.firebasestorage.app",
            messagingSenderId: "180327659657",
            appId: "1:180327659657:web:24d94b9d94bc349f232e58"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- AUTH CHECK ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('login-overlay').style.display = user ? 'none' : 'flex';
            if(user) loadDashboard();
        });

        window.handleLogin = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert("Mali ang credentials, Bro!"); }
        };

        window.handleLogout = () => signOut(auth);

        // --- SYNCED INVENTORY LOGIC ---
        window.saveProduct = async () => {
            const name = document.getElementById('p-name').value.trim();
            const price = document.getElementById('p-price').value;
            const qty = document.getElementById('p-qty').value;
            const img = document.getElementById('p-img').value;
            const gender = document.getElementById('p-gender').value; // Ito ang mag-si-sync sa index filter

            if(!name || !price || !qty || !img) return alert("Punan lahat ng fields!");

            try {
                // Gagamit ng 'gender' field para tugma sa index.html
                await setDoc(doc(db, "inventory", name), {
                    name,
                    price: Number(price),
                    qty: Number(qty),
                    img: img,
                    gender: gender, // 'male' or 'female'
                    clicks: 0,
                    dateAdded: Date.now()
                });
                alert("✅ Scent Added & Synced to Website!");
                document.getElementById('p-form').reset();
            } catch (e) { alert("Error: " + e.message); }
        };

        window.adjustStock = async (name, val) => {
            try { await updateDoc(doc(db, "inventory", name), { qty: increment(val) }); } 
            catch (e) { console.error(e); }
        };

        // --- ORDERS & TRACKING ---
        window.updateOrderStatus = async (id, status) => {
            let updateData = { status: status };
            if (status === "Shipped") {
                const track = prompt("J&T Tracking Number:");
                const eta = prompt("Estimated Arrival (e.g., April 5-7):");
                if(track) updateData.tracking = track;
                if(eta) updateData.estimatedArrival = eta;
            }
            await updateDoc(doc(db, "orders", id), updateData);
            alert("Order Status Updated!");
        };

        // --- REAL-TIME DATA ---
        function loadDashboard() {
            // Inventory Sync
            onSnapshot(collection(db, "inventory"), (snap) => {
                const list = document.getElementById('product-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    const p = d.data();
                    const low = p.qty <= 5 ? 'style="color:red; font-weight:bold;"' : '';
                    list.innerHTML += `
                        <tr>
                            <td><img src="${p.img}" width="40" style="border-radius:5px;"></td>
                            <td>${p.name}<br><small style="color:var(--amethyst)">${p.gender.toUpperCase()}</small></td>
                            <td ${low}>
                                <button class="qty-btn" onclick="adjustStock('${p.name}', -1)">-</button>
                                ${p.qty}
                                <button class="qty-btn" onclick="adjustStock('${p.name}', 1)">+</button>
                            </td>
                            <td>${p.clicks || 0}</td>
                            <td><button onclick="deleteDoc(doc(db, 'inventory', '${p.name}'))" style="color:red; border:none; background:none; cursor:pointer;"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>`;
                });
            });

            // Orders Sync
            onSnapshot(collection(db, "orders"), (snap) => {
                const oList = document.getElementById('order-list');
                oList.innerHTML = "";
                let rev = 0;
                snap.forEach(d => {
                    const o = d.data();
                    if(o.status === "Delivered") rev += Number(o.totalAmount);
                    oList.innerHTML += `
                        <tr>
                            <td>#${d.id.slice(-5).toUpperCase()}</td>
                            <td>${o.customerName}</td>
                            <td>₱${o.totalAmount}</td>
                            <td><span class="status-pill ${o.status.toLowerCase()}">${o.status}</span></td>
                            <td>
                                <select onchange="updateOrderStatus('${d.id}', this.value)">
                                    <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                                    <option value="Packing" ${o.status==='Packing'?'selected':''}>Packing</option>
                                    <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                                    <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
                                </select>
                            </td>
                        </tr>`;
                });
                document.getElementById('total-rev').innerText = "₱" + rev.toLocaleString();
            });
        }

        window.showTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };
    </script>

    <style>
        :root { --amethyst: #9b59b2; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .tab-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: #222; border: none; color: white; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--amethyst); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; }
        input, select { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; margin-bottom: 10px; width: 100%; border-radius: 8px; }
        .btn-main { background: var(--amethyst); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
        .qty-btn { background: #333; border: none; color: white; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .status-pill.pending { background: #e67e22; }
        .status-pill.shipped { background: #9b59b2; }
        .status-pill.delivered { background: #2ecc71; }
        #login-overlay { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="login-overlay">
        <div class="card" style="width: 320px; text-align: center;">
            <h2 style="color:var(--amethyst)">NYXEN ADMIN</h2>
            <input type="email" id="admin-email" placeholder="Admin Email">
            <input type="password" id="admin-pass" placeholder="Password">
            <button class="btn-main" onclick="handleLogin()">ACCESS DASHBOARD</button>
        </div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h2>NYXEN <span style="color:var(--amethyst)">MASTER EMPIRE</span></h2>
        <button onclick="handleLogout()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0;">
        <div class="card" style="text-align: center;">
            <small>Total Revenue</small>
            <h2 id="total-rev" style="color:var(--amethyst); margin: 5px 0;">₱0</h2>
        </div>
        <div class="card" style="text-align: center;">
            <small>Customer Engagement</small>
            <h2 id="stat-clicks" style="margin: 5px 0;">0 Clicks</h2>
        </div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="showTab('inventory-tab')">INVENTORY</button>
        <button class="tab-btn" onclick="showTab('orders-tab')">ORDERS</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <div class="card">
            <h3>Add New Scent</h3>
            <form id="p-form" onsubmit="event.preventDefault()">
                <input type="text" id="p-name" placeholder="Scent Name (e.g. Dior Sauvage)">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="p-price" placeholder="Price (₱)">
                    <input type="number" id="p-qty" placeholder="Stocks (Qty)">
                </div>
                <input type="text" id="p-img" placeholder="PostImages Direct Link URL">
                <select id="p-gender">
                    <option value="male">For Men (Male)</option>
                    <option value="female">For Women (Female)</option>
                </select>
                <button class="btn-main" onclick="saveProduct()">SYNC TO WEBSITE</button>
            </form>
        </div>

        <div class="card">
            <h3>Current Stock List</h3>
            <table>
                <thead>
                    <tr><th>Img</th><th>Scent</th><th>Stocks</th><th>Clicks</th><th>Action</th></tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>
    </div>

    <div id="orders-tab" class="tab-content" style="display: none;">
        <div class="card">
            <h3>Recent Transactions</h3>
            <table>
                <thead>
                    <tr><th>Order ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="order-list"></tbody>
            </table>
        </div>
    </div>

</body>
</html>
